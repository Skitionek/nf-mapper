name: Update README examples

# Regenerates the three example diagrams in README.md on every push to main
# and on every pull request that touches the source code or fixture files.
#
# On push to main the updated README is committed back automatically.
# On pull requests the job validates that the examples are up to date;
# if the source changed it updates the PR branch (same-repo PRs only).

on:
  push:
    branches: [main]
    paths:
      - "nf_mapper/**"
      - "tests/fixtures/**"
  pull_request:
    paths:
      - "nf_mapper/**"
      - "tests/fixtures/**"

permissions:
  contents: write

jobs:
  update-examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the head of the PR branch (not the merge commit) so we
          # can push back to it when the PR comes from the same repository.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nf-mapper
        run: pip install --quiet -e .

      - name: Regenerate linear pipeline example
        uses: Skitionek/nf-mapper@main
        with:
          pipeline: tests/fixtures/simple_workflow.nf
          title: "nf-core/rnaseq QC"
          format: md
          update: README.md
          marker: example-linear

      - name: Regenerate branching pipeline example
        uses: Skitionek/nf-mapper@main
        with:
          pipeline: tests/fixtures/complex_workflow.nf
          title: "RNA-seq Pipeline"
          format: md
          update: README.md
          marker: example-branching

      - name: Regenerate fetchngs example
        uses: Skitionek/nf-mapper@main
        with:
          pipeline: tests/fixtures/nf_core_fetchngs_sra.nf
          title: "nf-core/fetchngs SRA"
          format: md
          update: README.md
          marker: example-fetchngs

      - name: Commit updated examples
        # Commit on push to main, or on same-repo PRs.
        # Fork PRs cannot push back, so we skip the commit there.
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || \
            git commit -m "docs: regenerate README examples [skip ci]" && \
            git push
