name: "nf-mapper"
description: "Convert a Nextflow pipeline (.nf) into a Mermaid gitGraph diagram"
author: "Skitionek"

branding:
  icon: "map"
  color: "green"

inputs:
  pipeline:
    description: "Path to the Nextflow pipeline file (.nf) to convert"
    required: true
  output:
    description: "Path where the Mermaid diagram will be written (default: diagram.md). Ignored when 'update' is set."
    required: false
    default: "diagram.md"
  title:
    description: "Optional diagram title"
    required: false
    default: ""
  format:
    description: "Output format: 'plain' (raw Mermaid) or 'md' (fenced code block) (default: md)"
    required: false
    default: "md"
  renderer:
    description: "Renderer strategy: 'default', 'conditional', or 'metro' (default: default)"
    required: false
    default: "default"
  theme:
    description: "Theme class: 'nf-core' or 'plain' (default: nf-core)"
    required: false
    default: "nf-core"
  config:
    description: "JSON object of Mermaid gitGraph config overrides, e.g. '{\"showBranches\": true}'. Merged with defaults: showBranches=true, parallelCommits=false."
    required: false
    default: ""
  update:
    description: "Path to an existing Markdown file containing <!-- MARKER --> / <!-- /MARKER --> comment blocks. When set, the matching block is updated in-place instead of writing a new file."
    required: false
    default: ""
  marker:
    description: "Marker name identifying which comment block to update (default: nf-mapper). Use a unique name per diagram when a file contains multiple nf-mapper blocks, e.g. 'main-pipeline' targets <!-- main-pipeline --> / <!-- /main-pipeline -->."
    required: false
    default: "nf-mapper"

outputs:
  diagram:
    description: "Path to the generated or updated Mermaid diagram file"
    value: ${{ steps.generate.outputs.diagram }}

runs:
  using: "composite"
  steps:
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Build nf-mapper jar
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        mvn -f nf-mapper/pom.xml package -DskipTests -q
        echo "NF_MAPPER_JAR=${{ github.action_path }}/nf-mapper/target/nf-mapper-1.0.0.jar" >> "$GITHUB_ENV"

    - name: Generate diagram
      id: generate
      shell: bash
      run: |
        ARGS="${{ inputs.pipeline }} --format ${{ inputs.format }} --renderer ${{ inputs.renderer }} --theme ${{ inputs.theme }}"
        if [ -n "${{ inputs.title }}" ]; then
          ARGS="${ARGS} --title '${{ inputs.title }}'"
        fi
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="${ARGS} --config '${{ inputs.config }}'"
        fi
        if [ -n "${{ inputs.update }}" ]; then
          ARGS="${ARGS} --update '${{ inputs.update }}' --marker '${{ inputs.marker }}'"
          eval java -jar "${NF_MAPPER_JAR}" ${ARGS}
          echo "diagram=${{ inputs.update }}" >> "$GITHUB_OUTPUT"
        else
          OUTPUT="${{ inputs.output }}"
          ARGS="${ARGS} -o ${OUTPUT}"
          eval java -jar "${NF_MAPPER_JAR}" ${ARGS}
          echo "diagram=${OUTPUT}" >> "$GITHUB_OUTPUT"
        fi
